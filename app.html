<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bee Network v4.0 - Play & Earn</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <!-- Monetag -->
    <script>(function(s){s.dataset.zone='10696988',s.src='https://gizokraijaw.net/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

    <style>
        :root { --gold: #ffcc00; --neon: #00ffcc; --dark: #0a0a0a; }
        body { background: var(--dark); color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .balance-card { background: #111; border: 2px solid var(--gold); border-radius: 25px; padding: 20px; margin: 15px auto; width: 85%; }
        .bal-points { font-size: 40px; font-weight: 900; color: var(--gold); margin:0; }
        .main-btn { background: var(--gold); color: #000; border: none; padding: 15px; width: 90%; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 8px 0; }
        .footer { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 1000; }
        .section { display: none; padding: 10px; }
        .active-section { display: block !important; }
        
        /* Game Styling */
        #game-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 300px; margin: 20px auto; background: #222; padding: 10px; border-radius: 10px; }
        .cell { width: 50px; height: 50px; background: #333; display: flex; align-items: center; justify-content: center; font-size: 24px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 1. LOGIN -->
    <div id="login-screen" class="active-section" style="margin-top: 100px;">
        <div style="font-size: 80px;">🐝</div>
        <h1>BEE NETWORK PRO</h1>
        <button class="main-btn" onclick="googleLogin()">LOGIN & GET ₹50 BONUS</button>
    </div>

    <!-- 2. MINE SECTION -->
    <div id="mine-section" class="section">
        <div class="balance-card">
            <h1 class="bal-points" id="disp-bal">0</h1>
            <div style="color:var(--neon);">≈ ₹<span id="disp-inr">0.00</span></div>
        </div>
        <button class="main-btn" id="mine-btn" onclick="startMining()">⚡ START MINING</button>
        <button class="main-btn" style="background:#ff00ff; color:#fff;" onclick="window.open('https://omg10.com/4/10688923', '_blank')">📺 WATCH VIDEO (₹1)</button>
    </div>

    <!-- 3. GAME SECTION (BEE CRUSH) -->
    <div id="game-section" class="section">
        <h2 style="color:var(--gold);">🎮 BEE CRUSH GAME</h2>
        <p>Match 3 same items to earn coins!</p>
        <div id="game-board"></div>
        <p>Score: <span id="game-score">0</span></p>
        <button class="main-btn" style="background:var(--neon); color:#000;" onclick="initGame()">RESET GAME</button>
    </div>

    <!-- 4. WALLET -->
    <div id="wallet-section" class="section">
        <h2>👛 Withdraw</h2>
        <div class="balance-card">Available: ₹<span id="wall-inr">0.00</span></div>
        <input type="text" id="upi" style="width:80%; padding:12px; margin:10px; border-radius:10px;" placeholder="Enter UPI ID">
        <button class="main-btn" onclick="withdraw()">WITHDRAW NOW</button>
        <br><br>
        <a href="https://t.me/Shiv5kumar" style="color:var(--gold); text-decoration:none;">💬 Support: @Shiv5kumar</a>
    </div>

    <div class="footer" id="footer" style="display:none;">
        <div onclick="showTab('mine-section')">🏠 Mine</div>
        <div onclick="showTab('game-section')">🎮 Play</div>
        <div onclick="showTab('wallet-section')">👛 Wallet</div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCvKAzu4Nj7IngFHg-VI59ZrIe4DYOmRTw", authDomain: "stravhoneybee.firebaseapp.com", projectId: "stravhoneybee", appId: "1:940311188604:web:21c4009a124ecd19c065f9" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let userRef, balance = 0, isMining = false;

        // Login Logic
        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => location.reload());
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.remove('active-section');
                document.getElementById('footer').style.display = 'flex';
                showTab('mine-section');
                userRef = db.collection("users").doc(user.uid);
                userRef.get().then(doc => {
                    if (doc.exists) { balance = doc.data().balance; updateUI(); }
                    else { userRef.set({ email: user.email, balance: 5000 }); balance = 5000; updateUI(); }
                });
            }
        });

        // Mining Logic
        function startMining() {
            if(isMining) return; isMining = true;
            setInterval(() => { balance += 0.05; updateUI(); }, 1000);
            setInterval(() => { if(userRef) userRef.update({ balance: balance }); }, 10000);
        }

        // --- 🎮 BEE CRUSH GAME LOGIC ---
        const items = ['🐝', '🍯', '🌸', '🍎', '💎'];
        let score = 0;

        function initGame() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            score = 0;
            document.getElementById('game-score').innerText = score;
            // Show Ad on Game Start
            window.open("https://omg10.com/4/10655169", "_blank");

            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = items[Math.floor(Math.random() * items.length)];
                cell.onclick = () => {
                    score += 10;
                    balance += 1; // 1 Coin per click
                    document.getElementById('game-score').innerText = score;
                    cell.innerText = items[Math.floor(Math.random() * items.length)];
                    updateUI();
                    // Show Ad every 50 points
                    if(score % 50 === 0) window.open("https://omg10.com/4/10655169", "_blank");
                };
                board.appendChild(cell);
            }
        }

        function updateUI() {
            let inr = (balance / 100).toFixed(2);
            document.getElementById('disp-bal').innerText = Math.floor(balance);
            document.getElementById('disp-inr').innerText = inr;
            document.getElementById('wall-inr').innerText = inr;
        }

        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            if(id === 'game-section') initGame();
        }

        function withdraw() {
            if(balance < 10000) alert("Need ₹100 to withdraw!");
            else alert("Withdrawal Request Sent!");
        }
    </script>
</body>
</html>
