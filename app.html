<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strav Honey Bee Network - Pro</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <!-- ⬇️ AAPKA NAYA CPAGRIP VIDEO LOCKER SCRIPT ⬇️ -->
    <script type="text/javascript" src="https://doctoredits.com/script_include.php?id=1881581"></script>

    <style>
        :root { --gold: #ffcc00; --green: #00ff99; --bg: #000; }
        body { background-color: var(--bg); color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 90px; user-select: none; }
        .notice { background: #ff3300; padding: 10px; font-size: 12px; font-weight: bold; border-bottom: 1px solid #fff; }
        .balance-box { background: linear-gradient(145deg, #1a1a1a, #000); padding: 25px; border-radius: 25px; margin: 20px auto; width: 85%; border: 1px solid var(--gold); box-shadow: 0 0 20px rgba(255, 204, 0, 0.2); }
        .balance { font-size: 45px; font-weight: bold; color: var(--gold); }
        .inr { font-size: 20px; color: var(--green); font-weight: bold; }
        .bee { font-size: 90px; animation: fly 3s infinite ease-in-out; margin: 20px 0; }
        @keyframes fly { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .main-btn { background: linear-gradient(45deg, var(--gold), #ff9900); border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; width: 85%; color: #000; margin-top: 10px; }
        .footer { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 1000; }
        .section { display: none; padding: 20px; }
        .active-section { display: block !important; }
        input, select { width: 85%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #222; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="notice">⚠️ Verify Task to Unlock ₹50 UPI Withdrawal!</div>

    <!-- 1. LOGIN SCREEN -->
    <div id="login-screen" style="margin-top: 100px;">
        <div class="bee">🐝</div>
        <h1 style="color:var(--gold);">BEE NETWORK</h1>
        <button class="main-btn" onclick="googleLogin()">LOGIN WITH GOOGLE</button>
    </div>

    <!-- 2. MINE SECTION -->
    <div id="mine-section" class="section">
        <div class="balance-box">
            <div class="balance" id="display-balance">0.00</div>
            <div class="inr">≈ ₹<span id="display-inr">0.00</span></div>
            <div id="sync-msg" style="font-size:10px; color:var(--green); margin-top:5px;">Cloud Synced ✅</div>
        </div>
        <div class="bee">🐝</div>
        <button class="main-btn" id="mine-btn" onclick="startMining()">START MINING</button>
        
        <!-- MEGA REWARD BUTTON (Paisa Engine) -->
        <button class="main-btn" style="background: #ff00ff; color:#fff;" onclick="startMegaTask()">📺 WATCH & EARN ₹25</button>
    </div>

    <!-- 3. TASK SECTION -->
    <div id="task-section" class="section">
        <h2>📋 TASKS</h2>
        <div class="balance-box" style="text-align:left; padding:15px;">
            <h4 style="margin:0; color:var(--gold);">Mega App Offer</h4>
            <p style="font-size:13px;">Install 1 App from list and get ₹40 instantly.</p>
            <button class="main-btn" style="width:100%; font-size:14px;" onclick="call_locker();">OPEN TASK WALL</button>
        </div>
        <button class="main-btn" style="background:#25D366; color:#fff;" onclick="shareApp()">INVITE FRIENDS (₹10)</button>
    </div>

    <!-- 4. WALLET SECTION -->
    <div id="wallet-section" class="section">
        <h2>👛 WITHDRAW</h2>
        <div class="balance-box">Balance: ₹<span id="wallet-inr">0.00</span></div>
        <select id="pay-method"><option value="UPI">UPI (GPay/PhonePe)</option><option value="USDT">USDT (BEP20)</option></select>
        <input type="text" id="wallet-address" placeholder="Enter ID or Address">
        <button class="main-btn" onclick="requestWithdraw()">WITHDRAW NOW</button>
        <br><br>
        <a href="https://t.me/Shiv5kumar" target="_blank" style="color:var(--gold); text-decoration:none; font-weight:bold;">💬 Contact Admin Support</a>
    </div>

    <!-- Navigation -->
    <div class="footer" id="main-footer" style="display:none;">
        <div onclick="showSection('mine-section')">🏠 Mine</div>
        <div onclick="showSection('task-section')">📋 Tasks</div>
        <div onclick="showSection('wallet-section')">👛 Wallet</div>
    </div>

    <script>
        // ==========================================
        // ⚠️ SIRF YE 2 DETAILS BHAREIN ⚠️
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCvKAzu4Nj7IngFHg-VI59ZrIe4DYOmRTw",
            authDomain: "stravhoneybee.firebaseapp.com",
            projectId: "stravhoneybee",
            storageBucket: "stravhoneybee.appspot.com",
            messagingSenderId: "940311188604",
            appId: "1:940311188604:web:21c4009a124ecd19c065f9"
        };
        // ==========================================

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let userDocRef, balance = parseFloat(localStorage.getItem('bee_bal')) || 0, miningMultiplier = 1, isMining = false;

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => location.reload());
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-footer').style.display = 'flex';
                showSection('mine-section');
                userDocRef = db.collection("users").doc(user.uid);
                updateUI();
                
                // LOAD FROM CLOUD (FIXED)
                userDocRef.get().then(doc => {
                    if (doc.exists) { 
                        balance = doc.data().balance; 
                        localStorage.setItem('bee_bal', balance);
                        updateUI(); 
                    } else {
                        userDocRef.set({ email: user.email, balance: 0 });
                    }
                });
            }
        });

        function startMining() {
            if(isMining) return; isMining = true;
            document.getElementById('mine-btn').innerText = "MINING ACTIVE...";
            setInterval(() => {
                balance += (0.01 * miningMultiplier); 
                updateUI();
                localStorage.setItem('bee_bal', balance);
            }, 1000);
            // Save to Cloud every 10 seconds
            setInterval(() => { if(userDocRef) userDocRef.update({ balance: balance }); }, 10000);
        }

        function startMegaTask() {
            // 1. Pehle Monetag Ad (Profit 1)
            window.open("https://omg10.com/4/10688923", "_blank");
            alert("Ad watched! Now complete the task to get ₹25.");
            // 2. Phir CPAGrip Locker (Profit 2)
            setTimeout(() => { call_locker(); }, 2000);
        }

        function updateUI() {
            let inr = (balance / 100).toFixed(2);
            document.getElementById('display-balance').innerText = Math.floor(balance);
            document.getElementById('display-inr').innerText = inr;
            document.getElementById('wallet-inr').innerText = inr;
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
        }

        function shareApp() { window.open("https://api.whatsapp.com/send?text=Earn UPI Cash Daily: https://t.me/StravBee_bot", "_blank"); }

        function requestWithdraw() {
            const addr = document.getElementById('wallet-address').value;
            if (balance < 5000) alert("Bhai ₹50 (5000 Coins) chahiye!");
            else {
                db.collection("withdrawals").add({ email: auth.currentUser.email, details: addr, method: document.getElementById('pay-method').value, amount_inr: (balance/100).toFixed(2), status: "Pending", date: new Date() });
                alert("Withdraw Request Sent!");
            }
        }
    </script>
</body>
</html>
