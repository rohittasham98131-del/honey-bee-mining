<body>

    <div class="notice-board">⚠️ NOTICE: High earning users must complete 1 App Task every 24h.</div>

    </div>

        <a href="https://t.me/Shiv5kumar" target="_blank" style="color:#ffcc00; text-decoration:none;">💬 Contact Admin (@Shiv5kumar)</a>
    </div>

    <div class="footer" id="main-footer" style="display:none;">
        <div onclick="showSection('mine-section')">🏠 Mine</div>
        <div onclick="showSection('task-section')">📋 Tasks</div>
        <div onclick="showSection('wallet-section')">👛 Wallet</div>

    <script>
        // --- ⚠️ DETAILS BHAREIN ⚠️ ---
        const firebaseConfig = {
            apiKey: "AIzaSyCvKAzu4Nj7IngFHg-VI59ZrIe4DYOmRTw",
            authDomain: "stravhoneybee.firebaseapp.com",
            projectId: "stravhoneybee",
            storageBucket: "stravhoneybee.appspot.com",
            messagingSenderId: "940311188604",
            appId: "1:940311188604:web:21c4009a124ecd19c065f9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let userDocRef, balance = 0, miningMultiplier = 1, isMining = false;

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => location.reload());
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-footer').style.display = 'flex';
                showSection('mine-section');
                userDocRef = db.collection("users").doc(user.uid);
                
                // LOAD FROM CLOUD
                userDocRef.get().then(doc => {
                    if (doc.exists) { balance = doc.data().balance || 0; updateUI(); }
                    else { userDocRef.set({ email: user.email, balance: 0 }); }
                });
            }
        });

        function startMining() {
            if (isMining) return;
            isMining = true;
            document.getElementById('mine-btn').innerText = "MINING ACTIVE...";
            setInterval(() => {
                balance += (0.05 * miningMultiplier); updateUI();
            }, 1000);
            
            // SAVE TO CLOUD EVERY 5 SECONDS (FAST SAVE)
            setInterval(() => {
                if (userDocRef) userDocRef.update({ balance: balance });
            }, 5000);
        }

        function boost5x() {
            window.open("https://omg10.com/4/10655169", "_blank");
            miningMultiplier = 5;
            document.getElementById('speed-meter').innerText = "SPEED: 5x 🔥";
            
            // 1 MINUTE TIMER (SAFE LIMIT)
            setTimeout(() => {
                miningMultiplier = 1;
                document.getElementById('speed-meter').innerText = "SPEED: 1x";
            }, 60000); 
            alert("5x Boost active for 1 minute! Keep app open.");
        }

        function shareApp() { window.open("https://api.whatsapp.com/send?text=Earn UPI Cash Daily: https://t.me/StravBee_bot", "_blank"); }
        function showSection(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section')); document.getElementById(id).classList.add('active-section'); }
        function updateUI() { let inr = (balance / 100).toFixed(2); document.getElementById('display-balance').innerText = Math.floor(balance); document.getElementById('display-inr').innerText = inr; document.getElementById('wallet-inr').innerText = inr; }
        function requestWithdraw() { if (balance < 5000) alert("Need ₹50!"); else alert("Withdraw Request Sent!"); }
    </script>
