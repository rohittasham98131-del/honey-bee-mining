<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strav Honey Bee v2.1 - 10x Boost Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script type="text/javascript" src="https://doctoredits.com/script_include.php?id=1879344"></script>
    <script>(function(s){s.dataset.zone='10696988',s.src='https://gizokraijaw.net/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
    <style>
        :root { --gold: #ffcc00; --neon-green: #00ff99; --dark-bg: #0a0a0a; }
        body { background-color: var(--dark-bg); color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 100px; user-select: none; }
        .header-v2 { background: #111; padding: 15px; border-bottom: 2px solid var(--gold); }
        .balance-card { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--gold); border-radius: 25px; padding: 25px; margin: 20px auto; width: 85%; }
        .balance-text { font-size: 45px; font-weight: 800; color: var(--gold); margin: 0; }
        .speed-tag { background: var(--gold); color: #000; padding: 5px 12px; border-radius: 10px; font-size: 13px; font-weight: bold; margin-top: 10px; display: inline-block; }
        .bee-img { font-size: 80px; animation: bounce 2s infinite ease-in-out; margin: 20px 0; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .action-btn { border: none; padding: 15px; width: 85%; border-radius: 15px; font-size: 17px; font-weight: bold; color: #000; margin: 8px 0; cursor: pointer; }
        .gold-btn { background: linear-gradient(135deg, var(--gold), #ff9900); }
        .purple-btn { background: linear-gradient(135deg, #cc00ff, #7700ff); color: #fff; }
        .red-btn { background: linear-gradient(135deg, #ff3300, #990000); color: #fff; }
        .green-btn { background: linear-gradient(135deg, #00c853, #1b5e20); color: #fff; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 100; }
        .section { display: none; }
        .active-section { display: block !important; }
    </style>
</head>
<body>

    <div class="header-v2"><h2>Strav Honey Bee v2.1</h2></div>

    <!-- 1. LOGIN -->
    <div id="login-screen" class="active-section" style="margin-top: 50px;">
        <div class="bee-img">🐝</div>
        <button class="action-btn gold-btn" onclick="googleLogin()">Sign in with Google</button>
    </div>

    <!-- 2. MINE SECTION -->
    <div id="mine-section" class="section">
        <div class="balance-card">
            <h1 class="balance-text" id="disp-bal">0</h1>
            <div style="color:var(--neon-green); font-size:20px;">≈ ₹<span id="disp-inr">0.00</span></div>
            <div id="speed-meter" class="speed-tag">MINING SPEED: 1x</div>
        </div>
        <div class="bee-img">🐝</div>
        <button class="action-btn gold-btn" id="mine-btn" onclick="startMining()">START MINING</button>
        <button class="action-btn purple-btn" id="v-btn" onclick="watchVideo()">📺 WATCH VIDEO (Earn ₹1)</button>
        <button class="action-btn red-btn" onclick="boost5x()">⚡ 5x BOOST (Watch Ad)</button>
    </div>

    <!-- 3. TASK SECTION -->
    <div id="task-section" class="section">
        <h2>🔥 Mega Tasks</h2>
        <div class="balance-card">
            <p>Install & Earn ₹40</p>
            <button class="action-btn gold-btn" onclick="call_locker()">GO TO TASKS</button>
        </div>
        <div class="balance-card" style="border-color: var(--neon-green);">
            <p>🚀 10x SUPER BOOST</p>
            <button class="action-btn green-btn" onclick="boost10x()">ACTIVATE 10x SPEED</button>
        </div>
    </div>

    <!-- 4. WALLET -->
    <div id="wallet-section" class="section">
        <h2>👛 Wallet</h2>
        <div class="balance-card">Available: ₹<span id="wall-inr">0.00</span></div>
        <input type="text" id="upi-id" style="width:80%; padding:15px; margin:10px; border-radius:10px;" placeholder="Enter UPI ID">
        <button class="action-btn gold-btn" onclick="withdraw()">WITHDRAW UPI</button>
        <br><br>
        <a href="https://t.me/Shiv5kumar" style="color:var(--gold); text-decoration:none;">💬 Support: @Shiv5kumar</a>
    </div>

    <div class="nav-bar" id="footer" style="display:none;">
        <div onclick="showTab('mine-section')">🏠 Mine</div>
        <div onclick="showTab('task-section')">📋 Tasks</div>
        <div onclick="showTab('wallet-section')">👛 Wallet</div>
    </div>

    <script>
        // --- ⚠️ DETAILS BHAREIN ⚠️ ---
        const firebaseConfig = {
            apiKey: "AIzaSyCvKAzu4Nj7IngFHg-VI59ZrIe4DYOmRTw",
            authDomain: "stravhoneybee.firebaseapp.com",
            projectId: "stravhoneybee",
            storageBucket: "stravhoneybee.appspot.com",
            messagingSenderId: "940311188604",
            appId: "1:940311188604:web:21c4009a124ecd19c065f9"
        };
        // ----------------------------

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let userRef, balance = parseFloat(localStorage.getItem('bal')) || 0, multiplier = 1, isMining = false;

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => location.reload());
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.remove('active-section');
                document.getElementById('footer').style.display = 'flex';
                showTab('mine-section');
                userRef = db.collection("users").doc(user.uid);
                updateUI();
                userRef.get().then(doc => {
                    if (doc.exists) { balance = doc.data().balance || 0; updateUI(); }
                    else { userRef.set({ email: user.email, balance: 0 }); }
                });
            }
        });

        function startMining() {
            if(isMining) return; isMining = true;
            document.getElementById('mine-btn').innerText = "MINING ACTIVE...";
            setInterval(() => {
                balance += (0.01 * multiplier); 
                updateUI();
                localStorage.setItem('bal', balance);
            }, 1000);
            setInterval(() => { if(userRef) userRef.update({ balance: balance }); }, 5000);
        }

        function watchVideo() {
            window.open("https://omg10.com/4/10688923", "_blank");
            const btn = document.getElementById('v-btn');
            btn.disabled = true;
            setTimeout(() => { 
                balance += 100; updateUI(); userRef.update({ balance: balance });
                btn.disabled = false; btn.innerText = "📺 VIDEO AD (Earn ₹1)";
            }, 60000);
        }

        function boost5x() {
            window.open("https://omg10.com/4/10655169", "_blank");
            multiplier = 5;
            document.getElementById('speed-meter').innerText = "SPEED: 5x 🔥";
            setTimeout(() => { multiplier = 1; document.getElementById('speed-meter').innerText = "SPEED: 1x"; }, 300000);
        }

        function boost10x() {
            // Shortlink wala link
            window.open("https://shrinkme.click/7FJVZs45", "_blank");
            multiplier = 10;
            document.getElementById('speed-meter').innerText = "SPEED: 10x 🚀🚀";
            document.getElementById('speed-meter').style.background = "#00c853";
            alert("10x SUPER BOOST ACTIVE!");
            setTimeout(() => { 
                multiplier = 1; 
                document.getElementById('speed-meter').innerText = "SPEED: 1x";
                document.getElementById('speed-meter').style.background = "#ffcc00";
            }, 300000);
        }

        function updateUI() {
            let inr = (balance / 100).toFixed(2);
            document.getElementById('disp-bal').innerText = Math.floor(balance);
            document.getElementById('disp-inr').innerText = inr;
            document.getElementById('wall-inr').innerText = inr;
        }

        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
        }

        function withdraw() {
            if(balance < 5000) alert("Min ₹50 needed!");
            else {
                db.collection("withdrawals").add({ email: auth.currentUser.email, upi: document.getElementById('upi-id').value, amount: (balance/100).toFixed(2), status: "Pending", date: new Date() });
                alert("Withdrawal Sent!");
            }
        }
    </script>
</body>
</html>
