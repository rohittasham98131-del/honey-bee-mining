<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strav Honey Bee - Fixed Version</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script type="text/javascript" src="https://doctoredits.com/script_include.php?id=1879344"></script>

    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 80px; user-select: none; }
        .balance-box { background: linear-gradient(45deg, #222, #111); padding: 20px; border-radius: 20px; margin: 20px auto; width: 85%; border: 1px solid #ffcc00; }
        .balance { font-size: 40px; font-weight: bold; color: #ffcc00; }
        .inr-val { font-size: 18px; color: #00ff00; }
        .speed-badge { background: #ffcc00; color: #000; padding: 5px 12px; border-radius: 10px; font-size: 13px; font-weight: bold; margin-top: 10px; display: inline-block; }
        .timer-text { color: #ff3300; font-size: 14px; margin-top: 5px; font-weight: bold; display: none; }
        .bee { font-size: 80px; animation: fly 3s infinite ease-in-out; margin: 15px 0; }
        @keyframes fly { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .main-btn { background: linear-gradient(45deg, #ffcc00, #ff9900); border: none; padding: 12px 30px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; width: 85%; margin: 10px 0; color: #000; }
        .footer { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .section { display: none; padding: 20px; }
        .active-section { display: block !important; }
        input, select { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #222; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="login-screen" style="margin-top: 100px;">
        <div class="bee">🐝</div>
        <h1>BEE NETWORK</h1>
        <button class="main-btn" onclick="googleLogin()">Login with Google</button>
    </div>

    <div id="mine-section" class="section">
        <div class="balance-box">
            <div class="balance" id="display-balance">0.00</div>
            <div class="inr-val">≈ ₹<span id="display-inr">0.00</span></div>
            <div id="speed-meter" class="speed-badge">SPEED: 1x</div>
            <div id="boost-timer" class="timer-text">Boost ends in: 05:00</div>
        </div>
        <div class="bee">🐝</div>
        <button class="main-btn" id="mine-btn" onclick="startMining()">START MINING</button>
        <button class="main-btn" style="background: #ff3300; color: white;" onclick="boostSpeed()">⚡ BOOST 5x (Watch Ad)</button>
    </div>

    <div id="task-section" class="section">
        <h2>📋 Daily Tasks</h2>
        <button class="main-btn" style="background: #00ccff; color: white;" onclick="call_locker();">GO TO TASKS</button>
        <button class="main-btn" style="background: #25D366; color: white;" onclick="shareApp()">SHARE ON WHATSAPP</button>
    </div>

    <div id="wallet-section" class="section">
        <h2>👛 Wallet</h2>
        <div class="balance-box"><p>Balance: ₹<span id="wallet-inr">0.00</span></p></div>
        <input type="text" id="wallet-address" placeholder="Enter UPI ID or Wallet">
        <button class="main-btn" onclick="requestWithdraw()">WITHDRAW NOW</button>
    </div>

    <div class="footer" id="main-footer" style="display:none;">
        <div onclick="showSection('mine-section')">🏠 Mine</div>
        <div onclick="showSection('task-section')">📋 Tasks</div>
        <div onclick="showSection('wallet-section')">👛 Wallet</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCvKAzu4Nj7IngFHg-VI59ZrIe4DYOmRTw",
            authDomain: "stravhoneybee.firebaseapp.com",
            projectId: "stravhoneybee",
            storageBucket: "stravhoneybee.appspot.com",
            messagingSenderId: "940311188604",
            appId: "1:940311188604:web:21c4009a124ecd19c065f9"
        };
        const MONETAG_LINK = "https://omg10.com/4/10655169";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let userDocRef, balance = 0, miningMultiplier = 1, isMining = false;

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => location.reload());
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-footer').style.display = 'flex';
                showSection('mine-section');
                userDocRef = db.collection("users").doc(user.uid);
                userDocRef.get().then(doc => {
                    if (doc.exists) { balance = doc.data().balance || 0; updateUI(); }
                    else { userDocRef.set({ email: user.email, balance: 0 }); }
                });
            }
        });

        function startMining() {
            if (isMining) return;
            isMining = true;
            document.getElementById('mine-btn').innerText = "MINING ACTIVE...";
            document.getElementById('mine-btn').style.opacity = "0.5";
            
            setInterval(() => {
                balance += (0.01 * miningMultiplier); // Faster visual update
                updateUI();
            }, 1000);

            // Auto-save to Firebase every 30 seconds
            setInterval(() => {
                if(userDocRef) userDocRef.update({ balance: balance });
            }, 30000);
        }

        function boostSpeed() {
            window.open(MONETAG_LINK, "_blank");
            miningMultiplier = 5;
            document.getElementById('speed-meter').innerText = "SPEED: 5x 🔥";
            document.getElementById('speed-meter').style.background = "#ff3300";
            document.getElementById('speed-meter').style.color = "#fff";
            document.getElementById('boost-timer').style.display = "block";

            let timeLeft = 300; // 5 Minutes
            let countdown = setInterval(() => {
                timeLeft--;
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                document.getElementById('boost-timer').innerText = `Boost ends in: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
                
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    miningMultiplier = 1;
                    document.getElementById('speed-meter').innerText = "SPEED: 1x";
                    document.getElementById('speed-meter').style.background = "#ffcc00";
                    document.getElementById('speed-meter').style.color = "#000";
                    document.getElementById('boost-timer').style.display = "none";
                }
            }, 1000);
        }

        function updateUI() {
            let inr = (balance / 100).toFixed(2);
            document.getElementById('display-balance').innerText = Math.floor(balance);
            document.getElementById('display-inr').innerText = inr;
            document.getElementById('wallet-inr').innerText = inr;
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
        }

        function shareApp() {
            const msg = "Bhai, naya Indian Mining App ₹50 de raha hai! Join kar: https://t.me/StravBee_bot";
            window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(msg), "_blank");
        }

        function requestWithdraw() {
            const addr = document.getElementById('wallet-address').value;
            if (balance < 5000) alert("Need ₹50 (5000 Coins)!");
            else {
                db.collection("withdrawals").add({ email: auth.currentUser.email, address: addr, amount: (balance/100).toFixed(2), status: "Pending", date: new Date() });
                alert("Withdraw Request Sent!");
            }
        }
    </script>
</body>
</html>
